<section id="cta" class="cta-section relative bg-lp-bg-low py-28 lg:py-44 overflow-hidden">
  <div class="cta-glow absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] pointer-events-none"></div>

  <div class="relative z-10 max-w-7xl mx-auto px-6 lg:px-12 text-center lg:text-left">
    <div class="max-w-4xl mx-auto lg:mx-0">
      <p class="cta-kicker font-space text-xs uppercase tracking-[0.25em] text-lp-lime mb-8">
        Fulgaro Corpo e Mente
      </p>

      <h2 class="cta-headline font-lexend font-black text-lp-text leading-none mb-10 overflow-hidden">
        <span class="cta-word block">PRONTO A</span>
        <span class="cta-word block text-lp-lime">EVOLVERE?</span>
      </h2>

      <p class="cta-sub font-lexend font-light text-lp-muted text-xl leading-relaxed mb-14 max-w-xl mx-auto lg:mx-0">
        Unisciti ai nostri gruppi o prenota una sessione individuale.
        La prima valutazione è gratuita: analizziamo insieme le tue capacità
        e costruiamo il percorso giusto per te.
      </p>

      <div class="cta-buttons flex flex-col sm:flex-row gap-4 justify-center lg:justify-start mb-8">
        <button
          class="cta-primary font-lexend font-semibold text-sm uppercase tracking-widest px-10 py-5 text-white transition-transform duration-200 hover:scale-105"
          (click)="modalOpen.set(true)"
        >
          Prenota Valutazione Gratuita
        </button>
        <button class="cta-secondary font-lexend font-semibold text-sm uppercase tracking-widest px-10 py-5 text-lp-lime transition-all duration-200 hover:bg-lp-divider" (click)="scrollToLocations()">
          Vedi Dove Alleno
        </button>
      </div>

      <p class="cta-note font-space text-xs text-lp-muted tracking-wider">
        Nessun impegno. Risposta garantita entro 24 ore.
      </p>
    </div>
  </div>

  <div class="cta-bg-image absolute inset-0 pointer-events-none"></div>
</section>

<app-booking-modal [open]="modalOpen()" (close)="modalOpen.set(false)" />
