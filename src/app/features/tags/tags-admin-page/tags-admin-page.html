<div class="p-4 md:p-6">

  <header class="flex items-center justify-between mb-4 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold m-0">Tag</h1>
      <p class="text-sm text-slate-500 m-0 mt-1">Categorie e argomenti per gli articoli</p>
    </div>
    <p-button icon="pi pi-plus" label="Nuovo tag" (onClick)="openNew()" />
  </header>

  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
    <p-table
      [value]="store.entities()"
      [loading]="store.loading()"
      styleClass="p-datatable-sm"
      dataKey="id">

      <ng-template #header>
        <tr>
          <th style="width:6rem">Colore</th>
          <th>Nome</th>
          <th>Slug</th>
          <th style="width:8rem"></th>
        </tr>
      </ng-template>

      <ng-template #body let-tag>
        <tr>
          <td>
            <span class="tag-pill"
                  [style.--pill-color]="tag.color">
              <span class="tag-pill__dot"></span>
              <span>{{ tag.color }}</span>
            </span>
          </td>
          <td class="font-medium text-slate-800">{{ tag.name }}</td>
          <td class="text-sm text-slate-500 font-mono">{{ tag.slug }}</td>
          <td>
            <div class="flex gap-1 justify-end">
              <p-button icon="pi pi-pencil" severity="secondary" variant="text" size="small"
                        pTooltip="Modifica" tooltipPosition="top" (onClick)="openEdit(tag)" />
              <p-button icon="pi pi-trash" severity="danger" variant="text" size="small"
                        pTooltip="Elimina" tooltipPosition="top" (onClick)="askDelete(tag, $event)" />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template #empty>
        <tr>
          <td colspan="4">
            <div class="flex flex-col items-center justify-center py-12 text-slate-400">
              <i class="pi pi-tags text-4xl mb-3"></i>
              <p class="font-medium">Nessun tag creato</p>
              <p class="text-sm mt-1">Aggiungi il primo tag con il pulsante in alto a destra.</p>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>

<p-confirmDialog />

<!-- ── Dialog Aggiungi / Modifica ─────────────────────── -->
<p-dialog
  [(visible)]="dialogVisible"
  [header]="editingId() ? 'Modifica tag' : 'Nuovo tag'"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '480px' }">

  <div class="flex flex-col gap-4 py-2">

    <!-- Preview -->
    <div class="flex justify-center">
      <span class="tag-pill tag-pill--preview"
            [style.--pill-color]="form.color">
        <span class="tag-pill__dot"></span>
        <span>{{ form.name || 'Anteprima' }}</span>
      </span>
    </div>

    <!-- Nome -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-slate-700">Nome *</label>
      <input pInputText
             [ngModel]="form.name"
             (ngModelChange)="onNameChange($event)"
             placeholder="Es. Allenamento" class="w-full" />
    </div>

    <!-- Slug -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-slate-700">
        Slug *
        <span class="text-xs text-slate-500 font-normal">— identificatore url-safe</span>
      </label>
      <input pInputText
             [ngModel]="form.slug"
             (ngModelChange)="onSlugChange($event)"
             class="w-full font-mono" />
    </div>

    <!-- Colore -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-slate-700">Colore</label>
      <div class="flex flex-wrap gap-2">
        @for (c of palette; track c) {
          <button type="button"
                  class="color-swatch"
                  [class.is-active]="form.color === c"
                  [style.background]="c"
                  (click)="pickColor(c)">
          </button>
        }
      </div>
    </div>

  </div>

  <ng-template #footer>
    <p-button label="Annulla" severity="secondary" variant="text"
              (onClick)="dialogVisible = false" />
    <p-button label="Salva" icon="pi pi-check"
              [disabled]="!isFormValid"
              (onClick)="save()" />
  </ng-template>
</p-dialog>
